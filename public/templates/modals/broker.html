<!-- BROKER MODAL -->
<div class="modal-overlay" id="broker-modal">
  <div class="modal" style="width:560px">
    <h3 id="broker-modal-title">Add broker account</h3>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="form-group">
        <label>Broker name</label>
        <input type="text" id="b-name" placeholder="e.g. Zerodha MCX">
      </div>
      <div class="form-group">
        <label>Exchange type</label>
        <select id="b-exchange-type">
          <option value="MCX">MCX</option>
          <option value="COMEX">COMEX</option>
          <option value="DGCX">DGCX</option>
        </select>
      </div>
      <div class="form-group">
        <label>Account ID / Client code</label>
        <input type="text" id="b-account-id" placeholder="e.g. ZR12345">
      </div>
      <div class="form-group">
        <label>API key / Password</label>
        <input type="password" id="b-password" placeholder="optional">
      </div>
      <div class="form-group">
        <label>Profit share %</label>
        <input type="number" id="b-profit-share" placeholder="0" value="0" min="0" max="100" step="0.1">
      </div>
      <!-- Now sits in the same grid, same size as other fields -->
      <div class="form-group">
        <label>Ongoing total P&amp;L (₹)</label>
        <input type="number" id="b-total-pnl" value="0">
      </div>
    </div>

    <div style="border-top:1px solid var(--border);margin-bottom:14px;padding-top:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;font-weight:600">Instruments</span>
        <button class="btn btn-sm" style="background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.25);color:var(--accent);font-size:11px" onclick="addInstrumentRow()">+ Add instrument</button>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1.3fr 0.9fr 1fr 0.9fr 20px;gap:8px;margin-bottom:6px;padding:0 12px">
        <span style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Instrument</span>
        <span style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Broker symbol</span>
        <span style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Lot qty</span>
        <span style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">₹/lot</span>
        <span style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Max lots</span>
        <span></span>
      </div>
      <div id="broker-instruments-list"></div>
    </div>

    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeBrokerModal()">Cancel</button>
      <button class="btn btn-primary" id="broker-save-btn" onclick="saveBroker()">Save broker</button>
    </div>
  </div>
</div>
