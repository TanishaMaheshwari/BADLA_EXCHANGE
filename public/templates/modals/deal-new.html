
<!-- NEW DEAL -->
<div class="modal-overlay" id="deal-modal">
  <div class="modal" style="width:680px">
    <h3>New Arbitrage Deal</h3>
    <div class="deal-modal-top" style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="form-group"><label>Instrument</label><select id="d-instrument"><option value="">Select...</option></select></div>
      <div class="form-group"><label>USD/INR Rate</label><input type="number" id="d-usd-inr" placeholder="89" value="89"></div>
      <div class="form-group"><label>DGINR at Entry</label><input type="number" id="d-dginr" placeholder="auto" readonly style="color:var(--accent)"></div>
    </div>
    <div class="deal-modal-legs" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="leg-card" style="border-color:rgba(0,255,136,0.25)">
        <div class="leg-card-title" style="color:var(--accent)">MCX LEG</div>
        <div class="form-group"><label>Side</label><select id="d-mcx-side"><option value="SELL">SELL</option><option value="BUY">BUY</option></select></div>
        <div class="form-group"><label>Entry Price (₹)</label><input type="number" id="d-mcx-price" placeholder="0" step="0.01"></div>
        <div class="form-group"><label>Qty</label><input type="number" id="d-mcx-qty" placeholder="1" value="1" min="0.01" step="0.01"></div>
        <div class="form-group"><label>Brokerage (₹)</label><input type="number" id="d-mcx-brok" placeholder="0" value="0" min="0" step="0.01"></div>
        <div class="broker-select-row"><label>Broker Account</label><select id="d-mcx-broker" onchange="autofillLegBroker('mcx')"><option value="">No broker</option></select></div>
      </div>
      <div class="leg-card" style="border-color:rgba(255,215,0,0.25)">
        <div class="leg-card-title" style="color:var(--gold)">COMEX LEG</div>
        <div class="form-group"><label>Side</label><select id="d-comex-side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
        <div class="form-group"><label>Entry Price (USD)</label><input type="number" id="d-comex-price" placeholder="0" step="0.000001"></div>
        <div class="form-group"><label>Qty</label><input type="number" id="d-comex-qty" placeholder="1" value="1" min="0.000001" step="0.000001"></div>
        <div class="form-group"><label>Brokerage (₹)</label><input type="number" id="d-comex-brok" placeholder="0" value="0" min="0" step="0.000001"></div>
        <div class="broker-select-row"><label>Broker Account</label><select id="d-comex-broker" onchange="autofillLegBroker('comex')"><option value="">No broker</option></select></div>
      </div>
    </div>
    <label class="dgcx-toggle-row" style="margin-bottom:12px" for="d-dgcx-enabled">
      <input type="checkbox" id="d-dgcx-enabled" onchange="toggleDgcxLeg()">
      <span class="dgcx-toggle-label">DGCX LEG</span><span class="dgcx-toggle-sub">Optional third leg</span>
    </label>
    <div id="dgcx-leg-fields" style="display:none;margin-bottom:14px">
      <div class="leg-card" style="border-color:rgba(100,200,255,0.25)">
        <div class="leg-card-title" style="color:#6cf">DGCX LEG</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group"><label>Side</label><select id="d-dgcx-side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
          <div class="form-group"><label>Entry Price (USD)</label><input type="number" id="d-dgcx-price" placeholder="0" step="0.000001"></div>
          <div class="form-group"><label>Qty</label><input type="number" id="d-dgcx-qty" placeholder="1" value="1" min="0.000001" step="0.000001"></div>
          <div class="form-group"><label>Brokerage (₹)</label><input type="number" id="d-dgcx-brok" placeholder="0" value="0" min="0" step="0.000001"></div>
        </div>
        <div class="broker-select-row"><label>Broker Account</label><select id="d-dgcx-broker" onchange="autofillLegBroker('dgcx')"><option value="">No broker</option></select></div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:4px"><label>Note (optional)</label><input type="text" id="d-note" placeholder="e.g. spread 1024"></div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeDealModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDeal()">Save Deal</button>
    </div>
  </div>
</div>
