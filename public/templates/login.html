<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">BADLA<span>BOARD</span></div>
    <div class="login-sub">Sign in to your account</div>
    <div class="login-field"><label>Username</label><input type="text" id="l-user" placeholder="username" autocomplete="username"></div>
    <div class="login-field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid username or password</div>
  </div>
</div>
