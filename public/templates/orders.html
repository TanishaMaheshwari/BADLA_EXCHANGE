  <!-- ORDERS PAGE -->
  <div class="page" id="page-orders">
    <div class="dash-header">
      <div class="dash-title">Orders</div>
      <button class="btn-add-instr" onclick="openOrderModal(null)">+ New Order</button>
    </div>
    <div class="deal-controls" style="margin-bottom:12px">
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="filter-btn active" id="otab-all"      onclick="setOrderTab('all')">All</button>
        <button class="filter-btn"        id="otab-pending"  onclick="setOrderTab('pending')">Pending</button>
        <button class="filter-btn"        id="otab-executed" onclick="setOrderTab('executed')">Executed</button>
      </div>
    </div>
    <div id="orders-cards" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>
